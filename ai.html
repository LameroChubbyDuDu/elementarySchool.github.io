<!DOCTYPE html>
<html>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&family=Titan+One&family=Vast+Shadow&display=swap');

    body {
        margin: 0%;
        padding: 0%;
        text-align: left;
        overflow-x: hidden;
        cursor: url("img/dotted.png"), auto;
    }

    .bg {
        background-image: url("img/bg.png"), url("img/mask.png");
        background-blend-mode: multiply;
        background-repeat: no-repeat;
        background-size: cover;

        filter: blur(8px);
        transform: scale(1.2);

        position: fixed;
        top: 0;
        left: 0;

        width: 100%;
        height: 100%;

        z-index: -1;
    }

    .menu {
        display: flex;
        /* flex-direction: row; */
        justify-content: flex-start;
        align-items: flex-start;
        text-align: left;
        left: 0px;
        /* gap: 20px; */
        margin-top: -25px;
        z-index: 1;
    }

    .navBar {
        position: absolute;
        width: 100%;
        margin-left: -10px;
    }

    .elements {
        position: relative;
        margin-left: 0px;
        text-decoration: none;
        display: flex;
        flex-direction: row;
        width: 100%;
        background-color: #0a0a0a;
        height: 40px;

        padding: 0 20px;
    }

    .item-3 {
        font-family: "Pixelify Sans", sans-serif;
        list-style-type: none;

        text-align: left;

        color: aliceblue;
        background-color: transparent;

        font-size: 25px;
        margin-right: 30px;
        margin: 10px;
        margin-left: auto;
    }

    .item-3:hover {
        background-image: url("img/line.png");
    }

    .conversation {
        background-color: rgba(255, 255, 255, 0.6);
        width: 40%;
        height: 60%;
        position: absolute;
        top: 20%;
        left: 50%;
        transform: translateX(-50%);
        border-radius: 50px;

        display: flex;
        align-items: center;
        flex-direction: column;
    }

    .txt {
        top: 10%;
        border-radius: 50px;
        width: 40%;
        position: absolute;
        left: 50%;
        min-height: 50px;
        text-wrap: wrap;
        overflow-wrap: break-word;
        word-break: break-all;
        transform: translateX(-50%);
        padding: 10px;
    }

    label {
        font-family: "Pixelify Sans", sans-serif;
        top: 40%;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        color: #0a0a0a;
    }

    .refImg {
        top: 50%;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);

    }

    .enter {
        font-family: "Pixelify Sans", sans-serif;
        font-size: 30px;
        width: 120px;
        height: 80px;
        background-color: rgb(0, 0, 0);
        border-radius: 60px;
        color: aliceblue;

        z-index: 20;
        position: absolute;
        top: 70%;
    }

    .generatedImg {
        width: 256px;
        height: 256px;
        /* z-index: 50; */
        position: absolute;
        left: 50%;
        transform: translate(-50%);
        top: 100%;
    }

    .loading {
        position: absolute;
        top: 120%;
        left: 50%;
        transform: translate(-50%);
        width: 80px;
        height: 80px;
        z-index: 70;
        display: none;
    }

    footer {
        position: absolute;
        color: white;
        font-family: "Pixelify Sans", sans-serif;
        bottom: 3%;
        left: 50%;
        transform: translateX(-50%);
    }

    span {
        color: white;
        font-size: 50px;
        vertical-align: middle;
    }

    @keyframes loadingAnimation {
        0% {transform: translate(-50%, -50%) rotate(0deg);}
        100% {transform: translate(-50%, -50%) rotate(360deg);}
    }

    @media(min-width:1200px) {}
</style>

<body>
    <div class="interactive-element">
        <div class="bg"></div>
    </div>

    <div class="menu">
        <nav class="navBar">
            <ul class="elements">
                <li class="item-3"><img class="door" src="img/door.png">Return</li>

            </ul>
        </nav>
    </div>

    <div class="conversation">
        <input type="text" placeholder="請輸入prompt..." class="txt"><br>
        <!-- <label for="refImg">choose your reference image</label>
        <input type="file" class="refImg" id="refImg"> -->
        <input type="submit" class="enter" value="submit">
        
    </div>
    <img class="generatedImg">
    <img src="img/loading.png" class="loading">

    <footer><span>&copy;</span> xtdesign</footer>

    <body>
        <script>
            const back = document.getElementsByClassName("item-3")[0];
            const txt = document.getElementsByClassName("txt")[0];
            const submit = document.getElementsByClassName("enter")[0];
            const img = document.getElementsByClassName("generatedImg")[0];
            const loading = document.getElementsByClassName("loading")[0];

            back.addEventListener('click', () => {
                window.location.replace('index.html');
            });

            submit.addEventListener('click', async () => {
                console.log(txt.value);
                loading.style.display='block';
                loading.style.animation='loadingAnimation linear 2s infinite';
                askAI();

            })


            async function askAI() {
                const prompt = document.getElementsByClassName("txt")[0].value;
                const submit = document.getElementsByClassName("enter")[0];

                const response = await fetch('http://localhost:3000/generate-img', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });
                const resImg = await response.json();
                
                img.onload = ()=> {
                    // loading.setAttribute("style", "animation: none");
                    // loading.setAttribute("style", "display: none");
                    loading.style.display='none';
                loading.style.animation='none';
                }

                try {
                    img.src = `data:image/png;base64,${resImg.image}`;
                } catch (err) {
                    console.error(err.message);
                }
            }
        </script>

</html>
