<!DOCTYPE html>
<html>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&family=Titan+One&family=Vast+Shadow&display=swap');

    body {
        margin: 0%;
        padding: 0%;
        text-align: left;
        overflow-x: hidden;
        cursor: url("img/dotted.png"), auto;
    }

    .bg {
        background-image: url("img/bg.png"), url("img/mask.png");
        background-blend-mode: multiply;
        background-repeat: no-repeat;
        background-size: cover;

        filter: blur(8px);
        transform: scale(1.2);

        position: fixed;
        top: 0;
        left: 0;

        width: 100%;
        height: 100%;

        z-index: -1;
    }

    .menu {
        display: flex;
        /* flex-direction: row; */
        justify-content: flex-start;
        align-items: flex-start;
        text-align: left;
        left: 0px;
        /* gap: 20px; */
        margin-top: -25px;
        z-index: 1;
    }

    .navBar {
        position: absolute;
        width: 100%;
        margin-left: -10px;
    }

    .elements {
        position: relative;
        margin-left: 0px;
        text-decoration: none;
        display: flex;
        flex-direction: row;
        width: 100%;
        background-color: #0a0a0a;
        height: 40px;

        padding: 0 20px;
    }

    .item-3 {
        font-family: "Pixelify Sans", sans-serif;
        list-style-type: none;

        text-align: left;

        color: aliceblue;
        background-color: transparent;

        font-size: 25px;
        margin-right: 30px;
        margin: 10px;
        margin-left: auto;
    }

    .item-3:hover {
        background-image: url("img/line.png");
    }

    .conversation {
        background-color: rgba(255, 255, 255, 0.6);
        width: 40%;
        height: 60%;
        position: absolute;
        top: 20%;
        left: 50%;
        transform: translateX(-50%);
        border-radius: 50px;
    }

    .txt {
        top: 10%;
        border-radius: 50px;
        width: 40%;
        position: absolute;
        left: 50%;
        min-height: 50px;
        text-wrap: wrap;
        overflow-wrap: break-word;
        word-break: break-all;
        transform: translateX(-50%);
        padding: 10px;
    }

    label {
        font-family: "Pixelify Sans", sans-serif;
        top: 40%;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        color: #0a0a0a;
    }

    .refImg{
        top: 50%;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
       
    }

    footer {
        position: absolute;
        color: white;
        font-family: "Pixelify Sans", sans-serif;
        bottom: 3%;
        left: 50%;
        transform: translateX(-50%);
    }

    span {
        color: white;
        font-size: 50px;
        vertical-align: middle;
    }

    @media(min-width:1200px) {}
</style>

<body>
    <div class="interactive-element">
        <div class="bg"></div>
    </div>

    <div class="menu">
        <nav class="navBar">
            <ul class="elements">
                <li class="item-3"><img class="door" src="img/door.png">Return</li>

            </ul>
        </nav>
    </div>

    <div class="conversation">
        <input type="text" placeholder="請輸入prompt..." class="txt"><br>
        <label for="refImg">choose your reference image</label>
        <input type="file" class="refImg" id="refImg">
    </div>

    <footer><span>&copy;</span> xtdesign</footer>

    <body>
        <script>
            const back = document.getElementsByClassName("item-3")[0];

            back.addEventListener('click', () => {
                window.location.replace('index.html');
            });
        </script>

</html>
