<!DOCTYPE html>
<html>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&family=Titan+One&family=Vast+Shadow&display=swap');

    @font-face {
        font-family: "Cubic11";
        src: url("https://raw.githubusercontent.com/ACh-K/Cubic-11/main/fonts/web/Cubic_11.woff2") format("woff2");
        font-weight: normal;
        font-style: normal;
    }

    body {
        margin: 0%;
        padding: 0%;
        text-align: left;
        overflow-x: hidden;
        cursor: url("img/arrow.png"), auto;
    }

    .bg {
        background-image: url("img/bg.png"), url("img/mask.png");
        background-blend-mode: multiply;
        background-repeat: no-repeat;
        background-size: cover;

        filter: blur(8px);
        transform: scale(1.2);

        position: fixed;
        top: 0;
        left: 0;

        width: 100%;
        height: 100%;

        z-index: -1;
    }

    .menu {
        display: flex;
        /* flex-direction: row; */
        justify-content: flex-start;
        align-items: flex-start;
        text-align: left;
        left: 0px;
        /* gap: 20px; */
        margin-top: -25px;
        z-index: 1;
    }

    .navBar {
        position: absolute;
        width: 100%;
        margin-left: -10px;
    }

    .elements {
        position: relative;
        margin-left: 0px;
        text-decoration: none;
        display: flex;
        flex-direction: row;
        width: 100%;
        background-color: #0a0a0a;
        height: 50px;

        padding: 0 20px;
    }

    .item-3 {
        font-family: "Pixelify Sans", sans-serif;
        list-style-type: none;

        text-align: left;

        color: aliceblue;
        background-color: transparent;

        font-size: 30px;
        margin-right: 30px;
        margin: 10px;
        margin-left: auto;
    }

    .item-3:hover {
        background-image: url("img/line.png");
    }

    .conversation {
        background-color: rgba(255, 255, 255, 0.6);
        /* background-color: transparent; */
        width: 40%;
        height: 64px;
        border-radius: 20px;
        position: absolute;
        top: 20%;
        left: 50%;
        transform: translateX(-50%);
        border-radius: 50px;

        display: flex;
        align-items: center;
        /* flex-direction: row; */
        justify-content: space-between;

        /* box-shadow:white 2px 3px 5px; */
    }

    .txt {
        font-family: "Cubic11";
        background: transparent;
        outline: none;
        border: none;
        text-wrap: wrap;
        overflow-wrap: break-word;
        word-break: break-all;
        flex: 1;
        margin-left: 20px;
    }

    label {
        font-family: "Pixelify Sans", sans-serif;
        top: 40%;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        color: #0a0a0a;
    }

    .refImg {
        top: 50%;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);

    }

    .enter {
        width: 64px;
        height: 64px;
        background-color: transparent;
        margin-left: 8px;
    }

    .generatedImg {
        width: 256px;
        height: 256px;
        /* z-index: 50; */
        position: absolute;
        left: 50%;
        transform: translate(-50%);
        /* top: 100%; */
        bottom: 20%;
    }

    .loading {
        position: absolute;
        bottom: 30%;
        left: 50%;
        transform: translate(-50%);
        width: 80px;
        height: 80px;
        z-index: 70;
        display: none;
    }

    .downloadBtn {
        position: absolute;
        width: 50px;
        height: 50px;
        bottom: 10%;
        left: 50%;
        transform: translate(-50%);
        display: none;
    }

    footer {
        position: absolute;
        color: white;
        font-family: "Pixelify Sans", sans-serif;
        bottom: -1%;
        left: 50%;
        transform: translateX(-50%);
    }

    span {
        color: white;
        font-size: 50px;
        vertical-align: middle;
    }

    @keyframes loadingAnimation {
        0% {
            transform: translate(-50%, -50%) rotate(0deg);
            width: 80px;
            height: 80px;
        }

        50% {
            opacity: 0.5;
            width: 60px;
            height: 60px;
        }

        100% {
            transform: translate(-50%, -50%) rotate(360deg);
            opacity: 1;
            width: 80px;
            height: 80px;
        }
    }

    @media(min-width:1200px) {}
</style>

<body>
    <div class="interactive-element">
        <div class="bg"></div>
    </div>

    <div class="menu">
        <nav class="navBar">
            <ul class="elements">
                <li class="item-3"><img class="door" src="img/door.png">Return</li>

            </ul>
        </nav>
    </div>

    <div class="conversation">
        <input type="text" placeholder="請輸入prompt..." class="txt" autofocus>
        <img class="enter" src="img/submit.png">

    </div>
    <img class="generatedImg">
    <img src="img/loading-2.png" class="loading">
    <img src="img/download.png" class="downloadBtn">

    <footer><span>&copy;</span> xtdesign</footer>

</body>
<script>
    const back = document.getElementsByClassName("item-3")[0];
    const txt = document.getElementsByClassName("txt")[0];
    const submit = document.getElementsByClassName("enter")[0];
    const img = document.getElementsByClassName("generatedImg")[0];
    const loading = document.getElementsByClassName("loading")[0];
    const downloadBtn = document.getElementsByClassName("downloadBtn")[0];

    back.addEventListener('click', () => {
        window.location.replace('main.html');
    });

    submit.addEventListener('mouseenter', async () => {
        submit.src = 'img/submit-hover.png'
    })

    submit.addEventListener('mouseleave', async () => {
        submit.src = 'img/submit.png'
    })

    downloadBtn.addEventListener('mouseenter', async () => {
        downloadBtn.src = 'img/download-hover.png'
    })

    downloadBtn.addEventListener('mouseleave', async () => {
        downloadBtn.src = 'img/download.png'
    })

    submit.addEventListener('click', async () => {
        console.log(txt.value);
        loading.style.display = 'block';
        loading.style.animation = 'loadingAnimation linear 2s infinite';
        askAI();

    })


    async function askAI() {
        const prompt = document.getElementsByClassName("txt")[0].value;
        const submit = document.getElementsByClassName("enter")[0];

        console.log("發送訊息: ", prompt);

        const response = await fetch('http://localhost:3000/generate-img', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt: prompt })
        });

        console.log(response.status);

        const resImg = await response.json();

        img.onload = () => {
            loading.style.display = 'none';
            loading.style.animation = 'none';
        }

        try {
            img.src = `data:image/png;base64,${resImg.image}`;

            downloadBtn.style.display = 'block';
            downloadBtn.addEventListener('click', async () => {
                // const canvas = document.createElement('canvas');
                // canvas.width = 32;
                // canvas.height = 32;

                // const ctx = canvas.getContext('2d');
                

                const downloadLink = document.createElement('a');
                // ctx.drawImage(img, 0, 0, 32, 32);
                // downloadLink.href = canvas.toDataURL('image/png');
                downloadLink.href = img.src;

                

                downloadLink.download = 'image.png';
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);
            })

        } catch (err) {
            console.error(err.message);
        }
    }
</script>

</html>
