<!DOCTYPE html>
<html>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&family=Titan+One&family=Vast+Shadow&display=swap');

    body {
        /* cursor: url("img/penguinCursor.PNG"), auto; */
        /* align-items: center;
        justify-content: center; */
        text-align: left;

        /* display: flex; */

        /* background: linear-gradient(90deg, #65aeb8 5px, transparent 5px),
            linear-gradient(#65aeb8 5px, transparent 5px);
        background-size: 50px 50px; */


        /* mask-mode: luminance; */

    }

    .interactive-element{
        align-items: center;
        justify-content: center;

    }

    .title {
        position: absolute;
        top: 15%;
        font-family: "Pixelify Sans", sans-serif;
        font-size: 80px;
        left: 50%;
        transform: translateX(-50%);
        color: rgb(255, 255, 255);
        text-shadow: 2px 2px 4px #0a0a0a;
        text-wrap: wrap;
    }

    .bg {
        background-image: url("img/bg.png"), url("img/mask.png");
        background-blend-mode: multiply;
        background-repeat: no-repeat;
        background-size: cover;

        filter:blur(8px);
        transform: scale(1.2);

        position: fixed;
        top: 0;
        left: 0;

        width: 100%;
        height: 100%;

        z-index: -1;
    }

    .menu {
        display: flex;
        /* flex-direction: row; */
        justify-content: flex-start;
        align-items: flex-start;
        text-align: left;
        left: 0px;
        /* gap: 20px; */
        margin-top: -25px;
        z-index: 1;
    }

    .navBar {
        position: absolute;
        width: 100%;
        margin-left: -10px;
    }

    .elements {
        position: relative;
        margin-left: 0px;
        text-decoration: none;
        display: flex;
        flex-direction: row;
        width: 100%;
        background-color: #0a0a0a;
        height: 40px;
    }

    .item-1,
    .item-2 {
        font-family: "Pixelify Sans", sans-serif;
        list-style-type: none;

        text-align: left;

        color: aliceblue;
        background-color: transparent;

        font-size: 25px;
        margin: 10px;

    }

    .bot-pic {
        vertical-align: middle;
        width: 15px;
        margin-right: 5px;
    }

    .item-2 {
        margin-bottom: 10px;
    }

    .item-1:hover,
    .item-2:hover {
        background-color: #d4529e;
    }

    .item-1:hover>ul {
        display: block;
        width: inherit;
    }

    .item-1:hover .second-elements {
        background-color: rgba(96, 96, 96, 0.5);
        width: inherit;
    }

    .second-elements {
        display: none;
        list-style-type: none;
        color: aliceblue;
        background-color: rgba(96, 96, 96, 0.5);
        width: inherit;
        padding: 0px;
        font-size: 25px;
    }

    .second-item {
        width: inherit;
    }

    .second-item:hover {
        background-color: #f445a5;
    }

    .ai-link {
        color: aliceblue;
    }

    footer {
        position: absolute;
        color: white;
        font-family: "Pixelify Sans", sans-serif;
        bottom: 3%;
        left: 50%;
        transform: translateX(-50%);
    }

    span {
        color: white;
        font-size: 50px;
        vertical-align: middle;
    }

    @media(min-width:1200px) {}
</style>

<body>
    <div class="interactive-element">
        <div class="bg"></div>
        
    </div>
    <div class="menu">
        <nav class="navBar">
            <ul class="elements">
                <li class="item-2"><a style="text-decoration: none;" href="ai.html" class="ai-link"><img class="bot-pic" src="img/bot.png">Mr.Bot</a></li>
                <li class="item-1">Works
                    <ul class="second-elements">
                        <li class="second-item">ABC</li>
                        <li class="second-item">DEF</li>
                    </ul>
                </li>

            </ul>
        </nav>
    </div>

    <footer><span>&copy;</span> xtdesign</footer>
    <body>
        <script>
        </script>

</html>
