<!DOCTYPE html>
<html>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&family=Titan+One&family=Vast+Shadow&display=swap');

    body {
        margin: 0%;
        padding: 0%;
        text-align: left;
        overflow-x: hidden;
        cursor: url("img/dotted.png"), auto;
    }

    .interactive-element {
        align-items: center;
        justify-content: center;

    }

    .title {
        position: absolute;
        top: 15%;
        font-family: "Pixelify Sans", sans-serif;
        font-size: 80px;
        left: 50%;
        transform: translateX(-50%);
        color: rgb(255, 255, 255);
        text-shadow: 2px 2px 4px #0a0a0a;
        text-wrap: wrap;
    }

    .bg {
        background-image: url("img/bg.png"), url("img/mask.png");
        background-blend-mode: multiply;
        background-repeat: no-repeat;
        background-size: cover;

        filter: blur(8px);
        transform: scale(1.2);

        position: fixed;
        top: 0;
        left: 0;

        width: 100%;
        height: 100%;

        z-index: -1;
    }

    .menu {
        display: flex;
        /* flex-direction: row; */
        justify-content: flex-start;
        align-items: flex-start;
        text-align: left;
        left: 0px;
        /* gap: 20px; */
        margin-top: -25px;
        z-index: 1;
    }

    .navBar {
        position: absolute;
        width: 100%;
        margin-left: -10px;
    }

    .elements {
        position: relative;
        margin-left: 0px;
        text-decoration: none;
        display: flex;
        flex-direction: row;
        width: 100%;
        background-color: #0a0a0a;
        height: 50px;

        padding: 0 20px;
    }

    .item-1,
    .item-2 {
        font-family: "Pixelify Sans", sans-serif;
        list-style-type: none;

        text-align: left;

        color: aliceblue;
        background-color: transparent;

        font-size: 30px;
        margin: 10px;
    }

    .item-3 {
        font-family: "Pixelify Sans", sans-serif;
        list-style-type: none;

        text-align: left;

        color: aliceblue;
        background-color: transparent;

        font-size: 30px;
        margin-right: 30px;
        margin: 10px;
        margin-left: auto;
    }

    .door {
        vertical-align: middle;
    }

    .bot-pic {
        vertical-align: middle;
        width: 20px;
        margin-right: 5px;
    }

    .item-2 {
        margin-bottom: 10px;
    }

    .item-1:hover,
    .item-2:hover,
    .item-3:hover {
        /* background-color: #d4529e; */
        background-image: url("img/line.png");
    }

    .item-1:hover>ul {
        display: block;
        width: inherit;
    }

    .item-1:hover .second-elements {
        background-color: rgba(96, 96, 96, 0.5);
        width: inherit;
    }

    .second-elements {
        display: none;
        list-style-type: none;
        color: aliceblue;
        background-color: rgba(96, 96, 96, 0.5);
        width: inherit;
        padding: 0px;
        font-size: 30px;
    }

    .second-item {
        width: inherit;
    }

    .second-item:hover {
        background-color: #f445a5;
    }

    .ai-link {
        color: aliceblue;
    }

    footer {
        position: absolute;
        color: white;
        font-family: "Pixelify Sans", sans-serif;
        bottom: 3%;
        left: 50%;
        transform: translateX(-50%);
    }

    span {
        color: white;
        font-size: 50px;
        vertical-align: middle;
    }

    .txt {
        color: white;
        font-family: "Pixelify Sans", sans-serif;
        position: absolute;
        font-size: 20px;
        left: 50%;
        transform: translateX(-50%);
        top: 50%;
        z-index: 99;
        border-right: 0.2em solid white;
        animation: typewriterTxtAnimation 3s steps(15, start) forwards;
        text-wrap: nowrap;
        overflow: hidden;
    }

    .txtContainer {
        /* animation: typewriterContainerAnimation 3s linear forwards; */
        text-wrap: nowrap;
        overflow: hidden;
    }

    @keyframes typewriterTxtAnimation {
        0% { width: 0; }
        50%{ color: white; }
        100% { width: 400px; }
    }

    @keyframes barAnimation {
        0% {border-right: 0.2em solid white;}
        50% {border-right: 0.2em solid transparent;}
        100% {border-right: 0.2em solid white;}
    }

    @media(min-width:1200px) {}
</style>

<body>
    <div class="interactive-element">
        <div class="bg"></div>
    </div>
    <div class="menu">
        <nav class="navBar">
            <ul class="elements">
                <li class="item-2"><a style="text-decoration: none;" href="ai.html" class="ai-link"><img class="bot-pic"
                            src="img/bot.png">Mr.Bot</a></li>
                <li class="item-1">Works
                    <ul class="second-elements">
                        <li class="second-item">ABC</li>
                        <li class="second-item">DEF</li>
                    </ul>
                </li>

                <li class="item-3"><img class="door" src="img/door.png">Return</li>

            </ul>
        </nav>
    </div>
    <div class="txtContainer"><p class="txt">Here we'll display the students' artwork.<p></div>

    <footer><span>&copy;</span> xtdesign</footer>

    <body>
        <script>
            const back = document.getElementsByClassName("item-3")[0];
            const txt = document.getElementsByClassName("txt")[0];

            txt.addEventListener('animationend', ()=>{
                txt.style.animation = 'barAnimation 1s step-end infinite';
            })

            back.addEventListener('click', () => {
                window.location.replace('index.html');
            });
        </script>

</html>
