<!DOCTYPE html>
<html>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&family=Titan+One&family=Vast+Shadow&display=swap');

    body {
        margin: 0%;
        padding: 0%;
        text-align: left;
        overflow-x: hidden;
        cursor: url("../img/dotted.png"), auto;
    }

    .interactive-element {
        align-items: center;
        justify-content: center;

    }

    .title {
        position: absolute;
        top: 15%;
        font-family: "Pixelify Sans", sans-serif;
        font-size: 80px;
        left: 50%;
        transform: translateX(-50%);
        color: rgb(255, 255, 255);
        text-shadow: 2px 2px 4px #0a0a0a;
        text-wrap: wrap;
    }

    .bg {
        background-image: url("../img/bg.png"), url("../img/mask.png");
        background-blend-mode: multiply;
        background-repeat: no-repeat;
        background-size: cover;

        filter: blur(8px);
        transform: scale(1.2);

        position: fixed;
        top: 0;
        left: 0;

        width: 100%;
        height: 100%;

        z-index: -1;
    }

    .menu {
        display: flex;
        /* flex-direction: row; */
        justify-content: flex-start;
        align-items: flex-start;
        text-align: left;
        left: 0px;
        /* gap: 20px; */
        margin-top: -25px;
        z-index: 9999;
    }

    .navBar {
        position: absolute;
        width: 100%;
        margin-left: -10px;
    }

    .elements {
        position: relative;
        margin-left: 0px;
        text-decoration: none;
        display: flex;
        flex-direction: row;
        width: 100%;
        background-color: #0a0a0a;
        height: 50px;

        padding: 0 20px;
    }

    .item-1,
    .item-2 {
        font-family: "Pixelify Sans", sans-serif;
        list-style-type: none;

        text-align: left;

        color: aliceblue;
        background-color: transparent;

        font-size: 30px;
        margin: 10px;
    }

    .item-3 {
        font-family: "Pixelify Sans", sans-serif;
        list-style-type: none;

        text-align: left;

        color: aliceblue;
        background-color: transparent;

        font-size: 30px;
        margin-right: 30px;
        margin: 10px;
        margin-left: auto;
    }

    .door {
        vertical-align: middle;
    }

    .bot-pic {
        vertical-align: middle;
        width: 20px;
        margin-right: 5px;
    }

    .item-2 {
        margin-bottom: 10px;
    }

    .item-1:hover,
    .item-2:hover,
    .item-3:hover {
        /* background-color: #d4529e; */
        background-image: url("../img/line.png");
    }

    .item-1:hover>ul {
        display: block;
        width: inherit;
    }

    .item-1:hover .second-elements {
        background-color: rgba(96, 96, 96, 0.5);
        width: inherit;
    }

    .second-elements {
        display: none;
        list-style-type: none;
        color: aliceblue;
        background-color: rgba(96, 96, 96, 0.5);
        width: inherit;
        padding: 0px;
        font-size: 30px;
    }

    .second-item {
        width: inherit;
    }

    .second-item:hover {
        background-color: #f445a5;
    }

    .ai-link {
        color: aliceblue;
    }

    footer {
        position: absolute;
        color: white;
        font-family: "Pixelify Sans", sans-serif;
        bottom: 1%;
        left: 50%;
        transform: translateX(-50%);
    }

    span {
        color: white;
        font-size: 50px;
        vertical-align: middle;
    }

    .map-container {
        /* display: flex;
        justify-content: center;
        align-items: center; */
        width: fit-content;
        width: 700px;
        margin: auto;
        border: none;
        position: relative;
        top: 100px;
    }

    .map {
        width: 100%;
        height: auto;
        display: block;
        /* position: absolute; */
        /* left: 50%;
        transform: translate(-50%, -50%);
        top: 50%; */
    }

    .avatar {
        position: absolute;
        width: 32px;
        height: 32px;
        background-image: url("../img/character/man_in_jeans.png");
        left: 0;
        top: 0;
        animation: walk-front 5s linear forwards;
    }

    @keyframes typewriterTxtAnimation {
        0% {
            width: 0;
        }

        50% {
            color: white;
        }

        100% {
            width: 400px;
        }
    }

    @keyframes barAnimation {
        0% {
            border-right: 0.2em solid white;
        }

        50% {
            border-right: 0.2em solid transparent;
        }

        100% {
            border-right: 0.2em solid white;
        }
    }

    @keyframes walk-front {
        0% {
            background-image: url("../img/character/man_in_jeans_front_2.png");
        }

        50% {
            background-image: url("../img/character/man_in_jeans_front_3.png");
        }

        100% {
            background-image: url("../img/character/man_in_jeans_front_1.png");
        }
    }

    @keyframes walk-left {
        0% {
            background-image: url("../img/character/man_in_jeans_left_2.png");
        }

        50% {
            background-image: url("../img/character/man_in_jeans_left_3.png");
        }

        100% {
            background-image: url("../img/character/man_in_jeans_left_1.png");
        }
    }

    @keyframes walk-right {
        0% {
            background-image: url("../img/character/man_in_jeans_right_2.png");
        }

        50% {
            background-image: url("../img/character/man_in_jeans_right_3.png");
        }

        100% {
            background-image: url("../img/character/man_in_jeans_right_1.png");
        }
    }

    @keyframes walk-back {
        0% {
            background-image: url("../img/character/man_in_jeans_back_2.png");
        }

        50% {
            background-image: url("../img/character/man_in_jeans_back_3.png");
        }

        100% {
            background-image: url("../img/character/man_in_jeans_back_1.png");
        }
    }

    @keyframes bus-move {
        0% {
            background-image: url("../img/bus-1.png");
        }

        100% {
            background-image: url("../img/bus-2.png");
        }
    }

    @media(min-width:1200px) {}
</style>

<body>
    <div class="interactive-element">
        <div class="bg"></div>
    </div>
    <div class="menu">
        <nav class="navBar">
            <ul class="elements">
                <li class="item-2"><a style="text-decoration: none;" href="../ai.html" class="ai-link"><img
                            class="bot-pic" src="../img/bot.png">Mr.Bot</a></li>
                <li class="item-1">Works
                    <ul class="second-elements">
                        <li class="second-item">ABC</li>
                        <li class="second-item">DEF</li>
                    </ul>
                </li>

                <li class="item-3"><img class="door" src="../img/door.png">Return</li>

            </ul>
        </nav>
    </div>
    <div class="map-container">
        <img class="map" src="../img/左鎮國小_px.jpg">
        <div class="avatar"></div>
    </div>

    <footer><span>&copy;</span> xtdesign</footer>

    <body>
        <script>
            const avatar = document.getElementsByClassName("avatar")[0];
            const map = document.getElementsByClassName("map")[0];



            document.addEventListener('keydown', (event) => {
                const key = event.key;

                const avatarStyle = window.getComputedStyle(avatar);
                const left = avatarStyle.left;
                const top = avatarStyle.top;
                const step = 32;

                const maxWidth = window.innerWidth;
                const maxHeight = window.innerHeight;

                console.log(left, top);
                console.log("Max dimensions:", maxWidth, maxHeight);
                console.log("Avatar offsets:", avatar.offsetLeft, avatar.offsetTop);
                console.log("keyDown: ", key);

                const bound = map.getBoundingClientRect();
                console.log(`Bound Height = ${bound.height}, Width = ${bound.width}`);
                if (key === "ArrowLeft" || key === "a" || key === "A") {
                    if (avatar.offsetLeft <= 0) {
                        avatar.style.backgroundImage = "url('../img/character/man_in_jeans_left_1.png')";
                    } else {
                        avatar.style.left = (avatar.offsetLeft - step) + "px";
                        avatar.style.animationName = "walk-left";
                    }
                    // const isTeleport = teleport(avatar.offsetLeft, avatar.offsetTop);
                    // if (isTeleport) { window.location.replace("2.html"); }

                } else if (key === "ArrowRight" || key === "d" || key === "D") {
                    if (avatar.offsetLeft + avatar.offsetWidth + step > bound.width) {
                        console.log("Reached the right edge of the screen.");
                        avatar.style.backgroundImage = "url('../img/character/man_in_jeans_right_1.png')";
                    } else {
                        avatar.style.left = (avatar.offsetLeft + step) + "px";
                        avatar.style.animationName = "walk-right";
                    }
                    // const isTeleport = teleport(avatar.offsetLeft, avatar.offsetTop);
                    // if(isTeleport){window.location.replace("2.html");}
                } else if (key === "ArrowUp" || key === "w" || key === "W") {
                    if (avatar.offsetTop <= 0) {
                        avatar.style.backgroundImage = "url('../img/character/man_in_jeans_back_1.png')";
                    } else {
                        avatar.style.top = (avatar.offsetTop - step) + "px";
                        avatar.style.animationName = "walk-back";
                    }
                    // const isTeleport = teleport(avatar.offsetLeft, avatar.offsetTop);
                    // if (isTeleport) { window.location.replace("2.html"); }
                } else if (key === "ArrowDown" || key === "s" || key === "S") {
                    if (avatar.offsetTop + avatar.offsetHeight + step > bound.height) {
                        console.log("Reached the bottom edge of the screen.");
                        avatar.style.backgroundImage = "url('../img/character/man_in_jeans_front_1.png')";
                    } else {
                        avatar.style.top = (avatar.offsetTop + step) + "px";
                        avatar.style.animationName = "walk-front";
                    }

                }
            });
        </script>

</html>
