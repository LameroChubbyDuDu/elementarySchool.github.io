<!DOCTYPE html>
<html>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&family=Titan+One&family=Vast+Shadow&display=swap');

    body {

        text-align: left;
        cursor: url("img/dotted.png"), auto;

    }

    .interactive-element{
        align-items: center;
        justify-content: center;

    }

    .title {
        position: absolute;
        top: 15%;
        font-family: "Pixelify Sans", sans-serif;
        font-size: 80px;
        left: 50%;
        transform: translateX(-50%);
        color: rgb(255, 255, 255);
        text-shadow: 2px 2px 4px #0a0a0a;
        text-wrap: wrap;
    }

    .bg {
        background-image: url("img/bg.png"), url("img/mask.png");
        background-blend-mode: normal;
        background-repeat: no-repeat;
        background-size: cover;

        filter:blur(8px);

        position: fixed;
        top: 0;
        left: 0;

        width: 100%;
        height: 100%;

        z-index: -1;
    }

    .go {
        font-family: "Pixelify Sans", sans-serif;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translateX(-50%);

        padding: 8px 15px;
        margin: 0;

        text-align: center;

        color: azure;
        background-color: rgba(0, 0, 0, 0.5);
        border-radius: 20px;

        font-size: 30px;

    }

    .img-1 {
        position: absolute;
        z-index: 2;
        width: 200px;
        display: none;
        top:10%;
        /* right: 150px;
        top: 15%;
        rotate: -25deg; */
    }

    .img-2 {
        position: absolute;
        z-index: 2;
        width: 100px;
        display: none;
        top:10%;

    }

    @keyframes img-animation-1{
        0%{right: -10px;}
        50%{right: 50px; transform: rotateX(20deg); transform:rotate(30deg);}
        100%{right: 100px; transform: rotateX(-30deg); transform: rotate(-40deg);}
    }

    @keyframes img-animation-2{
        0%{left: -10px;}
        50%{left: 50px; transform: rotateX(20deg); transform:rotate(-30deg);}
        100%{left: 150px; transform: rotateX(-30deg); transform: rotate(40deg);}
    }

    .interactive-element:has(.go:hover) .bg{
        background-blend-mode: multiply;
        filter: blur(0px);
    }
    /* .go:hover+.bg {
        background-blend-mode: multiply;
    } */

    .interactive-element:has(.go:hover) .img-1{
        display: block;
        animation: img-animation-1 0.5s linear forwards;
    }

    .interactive-element:has(.go:hover) .img-2{
        display: block;
        animation: img-animation-2 0.5s linear forwards;
    }

    .go:hover {
        background-color: rgba(255, 255, 255, 0.5);
    }

    .menu {
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: flex-start;
        text-align: left;
        left: 0px;
        /* gap: 20px; */
        z-index: 1;
    }

    .elements {
        position: absolute;
        margin-left: 0px;
        text-decoration: none;

    }

    .item-1,
    .item-2 {
        list-style-type: none;

        text-align: left;

        color: aliceblue;
        background-color: #65aeb8;

        font-size: 30px;
        /* width: 5vw; */
        /* padding: 2px 8px; */

    }

    .item-2 {
        margin-bottom: 10px;
    }

    .item-1:hover,
    .item-2:hover {
        background-color: #d4529e;
    }

    .item-1:hover>ul {
        display: block;
        width: inherit;
    }

    .item-1:hover .second-elements {
        background-color: #468992;
        width: inherit;
    }

    .second-elements {
        display: none;
        list-style-type: none;
        color: aliceblue;
        background-color: #468992;
        width: inherit;
        padding: 0px;
        font-size: 30px;
    }

    .second-item {
        width: inherit;
    }

    .second-item:hover {
        background-color: #f445a5;
    }

    .ai-link {
        color: aliceblue;
    }

    footer {
        position: absolute;
        color: white;
        font-family: "Pixelify Sans", sans-serif;
        bottom: 3%;
        left: 50%;
        transform: translateX(-50%);
    }

    span {
        color: white;
        font-size: 50px;
        vertical-align: middle;
    }

    @media(min-width:1200px) {}
</style>

<body>
    <div class="interactive-element">
        <p class="title">Pixel Badlands</p>
        <p class="go">Enter</p>
        <div class="bg"></div>
        <img class="img-1" src="img/taxi.PNG">
        <img class="img-2" src="img/bus_stand.PNG">
    </div>

    <footer><span>&copy;</span> xtdesign</footer>
    <body>
        <script>
            const go = document.getElementsByClassName("go")[0];

            go.addEventListener('click', ()=>{
                console.log("go");
                // setTimeout(()=>{window.location.replace('main.html');}, 1000);
                window.location.replace('main.html');
            })
        </script>

</html>
